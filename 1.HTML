<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elements — Periodic Table</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=New+York:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<!-- Fallback fonts -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
/* ─── CSS Variables ─────────────────────────────────────────────────── */
:root {
  --bg-primary:    #0a0a0f;
  --bg-secondary:  #111118;
  --glass-bg:      rgba(255,255,255,0.06);
  --glass-border:  rgba(255,255,255,0.14);
  --glass-hover:   rgba(255,255,255,0.11);
  --glass-shine:   rgba(255,255,255,0.22);
  --text-primary:  rgba(255,255,255,0.92);
  --text-secondary:rgba(255,255,255,0.52);
  --text-muted:    rgba(255,255,255,0.32);
  --accent-blue:   #4fc3f7;
  --accent-indigo: #7c83f5;
  --accent-teal:   #4dd0c4;
  --radius-sm:     8px;
  --radius-md:     14px;
  --radius-lg:     22px;
  --shadow-glass:  0 8px 32px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.08) inset;
  --shadow-hover:  0 16px 48px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.14) inset;

  /* Category palette */
  --c-alkali:       #ff6b9d;
  --c-alkaline:     #ffaa5c;
  --c-lanthanide:   #c879ff;
  --c-actinide:     #ff79c0;
  --c-transition:   #4fc3f7;
  --c-post-trans:   #7ee8a2;
  --c-metalloid:    #ffe066;
  --c-nonmetal:     #80deea;
  --c-halogen:      #f48fb1;
  --c-noble:        #b39ddb;
  --c-unknown:      #90a4ae;
}

/* ─── Reset & Base ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Nunito', 'Helvetica Neue', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── Ambient Background ────────────────────────────────────────────── */
.ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  overflow: hidden;
}
.ambient::before {
  content: '';
  position: absolute;
  width: 900px; height: 900px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(76,195,247,0.07) 0%, transparent 70%);
  top: -200px; left: -200px;
  animation: driftA 20s ease-in-out infinite alternate;
}
.ambient::after {
  content: '';
  position: absolute;
  width: 700px; height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,131,245,0.07) 0%, transparent 70%);
  bottom: -200px; right: -100px;
  animation: driftB 26s ease-in-out infinite alternate;
}
@keyframes driftA { to { transform: translate(120px, 80px) scale(1.15); } }
@keyframes driftB { to { transform: translate(-80px, -60px) scale(1.1); } }

/* ─── Header ────────────────────────────────────────────────────────── */
.header {
  position: relative; z-index: 10;
  padding: 36px 40px 24px;
  display: flex; align-items: flex-end; justify-content: space-between;
  flex-wrap: wrap; gap: 16px;
}
.header-title h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 500;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.55));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
}
.header-title p {
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 400;
  margin-top: 6px;
  letter-spacing: 0.3px;
}
.element-count {
  font-size: 12px;
  color: var(--text-muted);
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  letter-spacing: 0.5px;
}

/* ─── Legend ────────────────────────────────────────────────────────── */
.legend {
  position: relative; z-index: 10;
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 0 40px 28px;
}
.legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-secondary);
  padding: 4px 10px 4px 8px;
  border-radius: 20px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(10px);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.legend-item:hover { background: var(--glass-hover); color: var(--text-primary); }
.legend-item.active { border-color: rgba(255,255,255,0.3); color: var(--text-primary); }
.legend-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}

/* ─── Table Wrapper ─────────────────────────────────────────────────── */
.table-scroll {
  position: relative; z-index: 10;
  overflow-x: auto;
  padding: 0 24px 40px;
  -webkit-overflow-scrolling: touch;
}
.table-scroll::-webkit-scrollbar { height: 4px; }
.table-scroll::-webkit-scrollbar-track { background: transparent; }
.table-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

/* ─── Periodic Grid ─────────────────────────────────────────────────── */
.periodic-grid {
  display: grid;
  grid-template-columns: repeat(18, minmax(58px, 1fr));
  grid-template-rows: repeat(10, auto);
  gap: 4px;
  min-width: 1060px;
  max-width: 1280px;
  margin: 0 auto;
}

/* Lanthanide/Actinide row separator */
.series-label {
  grid-column: 3 / 4;
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 6px;
  font-size: 9px; color: var(--text-muted);
  letter-spacing: 0.4px;
  text-transform: uppercase;
}

/* ─── Element Tile ──────────────────────────────────────────────────── */
.element {
  position: relative;
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  box-shadow: var(--shadow-glass);
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 4px 2px;
  overflow: hidden;
  transition: transform 0.22s cubic-bezier(.34,1.56,.64,1),
              box-shadow 0.22s ease,
              border-color 0.22s ease,
              background 0.22s ease;
  animation: tileIn 0.5s cubic-bezier(.34,1.4,.64,1) both;
}

/* Staggered entrance animation */
.element:nth-child(1)  { animation-delay: 0.02s; }
.element:nth-child(2)  { animation-delay: 0.04s; }
.element:nth-child(3)  { animation-delay: 0.06s; }
/* ... handled by JS for performance */

@keyframes tileIn {
  from { opacity: 0; transform: scale(0.8) translateY(6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* Shine overlay */
.element::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(255,255,255,0.13) 0%, transparent 50%);
  pointer-events: none;
}

.element:hover {
  transform: scale(1.14) translateY(-3px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(255,255,255,0.28);
  background: var(--glass-hover);
  z-index: 5;
}
.element:active { transform: scale(1.06); }

.el-number {
  font-size: 8.5px;
  color: var(--text-muted);
  line-height: 1;
  align-self: flex-start;
  padding-left: 5px;
  font-weight: 500;
}
.el-symbol {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1.1;
  color: var(--text-primary);
}
.el-name {
  font-size: 7px;
  color: var(--text-secondary);
  line-height: 1;
  text-align: center;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 0 3px;
}
.el-mass {
  font-size: 7px;
  color: var(--text-muted);
  line-height: 1;
  margin-top: 2px;
}

/* Category color accent — bottom strip */
.element::after {
  content: '';
  position: absolute;
  bottom: 0; left: 12%; right: 12%;
  height: 2.5px;
  border-radius: 2px 2px 0 0;
  background: var(--cat-color, rgba(255,255,255,0.2));
  opacity: 0.75;
  transition: opacity 0.2s;
}
.element:hover::after { opacity: 1; left: 6%; right: 6%; }

/* Dimmed state when filtering */
.element.dimmed {
  opacity: 0.18;
  pointer-events: none;
}
.element.highlighted { opacity: 1; }

/* ─── Modal Overlay ──────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.modal-overlay.open {
  opacity: 1; pointer-events: all;
}

/* ─── Modal Card ─────────────────────────────────────────────────────── */
.modal-card {
  position: relative;
  width: 100%; max-width: 780px;
  max-height: 92vh;
  border-radius: var(--radius-lg);
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(18,18,28,0.82);
  backdrop-filter: blur(40px) saturate(200%);
  -webkit-backdrop-filter: blur(40px) saturate(200%);
  box-shadow: 0 32px 96px rgba(0,0,0,0.7), 0 1px 0 rgba(255,255,255,0.1) inset;
  overflow: hidden;
  display: grid;
  grid-template-columns: 1fr 1fr;
  transform: scale(0.92) translateY(20px);
  transition: transform 0.35s cubic-bezier(.34,1.4,.64,1);
}
.modal-overlay.open .modal-card { transform: scale(1) translateY(0); }

@media (max-width: 640px) {
  .modal-card { grid-template-columns: 1fr; }
}

/* Card shine */
.modal-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
}

/* ─── 3D Panel ───────────────────────────────────────────────────────── */
.modal-3d {
  position: relative;
  min-height: 280px;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center,
    rgba(255,255,255,0.04) 0%, transparent 75%);
  overflow: hidden;
}
#three-canvas {
  width: 100% !important;
  height: 100% !important;
  min-height: 280px;
}
.modal-3d-label {
  position: absolute;
  bottom: 14px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: var(--text-muted);
  letter-spacing: 0.8px; text-transform: uppercase;
  pointer-events: none;
}
.drag-hint {
  position: absolute;
  top: 14px; right: 14px;
  font-size: 9px; color: var(--text-muted);
  letter-spacing: 0.4px;
  display: flex; align-items: center; gap: 4px;
}

/* ─── Detail Panel ───────────────────────────────────────────────────── */
.modal-detail {
  padding: 32px 28px;
  display: flex; flex-direction: column;
  gap: 0;
  overflow-y: auto;
}
.modal-detail::-webkit-scrollbar { width: 4px; }
.modal-detail::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
  z-index: 10;
  backdrop-filter: blur(10px);
}
.modal-close:hover { background: rgba(255,255,255,0.18); color: #fff; }

.detail-category {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--cat-color-modal, var(--accent-blue));
  margin-bottom: 8px;
}
.detail-symbol-row {
  display: flex; align-items: baseline; gap: 14px;
  margin-bottom: 6px;
}
.detail-symbol {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 72px;
  font-weight: 400;
  line-height: 1;
  color: var(--text-primary);
  letter-spacing: -2px;
}
.detail-number {
  font-size: 18px;
  color: var(--text-muted);
  font-weight: 300;
}
.detail-name {
  font-size: 26px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.3px;
  margin-bottom: 20px;
}

.detail-divider {
  height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.12), transparent);
  margin: 16px 0;
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.detail-field {
  display: flex; flex-direction: column; gap: 3px;
}
.detail-field.full { grid-column: 1 / -1; }
.detail-label {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.9px;
  text-transform: uppercase;
  color: var(--text-muted);
}
.detail-value {
  font-size: 14px;
  color: var(--text-primary);
  font-weight: 500;
  word-break: break-word;
}
.detail-value.mono {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
  color: var(--accent-teal);
}

/* State badge */
.state-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 600;
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid;
}
.state-solid   { color: #7ee8a2; border-color: rgba(126,232,162,0.3); background: rgba(126,232,162,0.08); }
.state-liquid  { color: #4fc3f7; border-color: rgba(79,195,247,0.3);  background: rgba(79,195,247,0.08); }
.state-gas     { color: #ce93d8; border-color: rgba(206,147,216,0.3); background: rgba(206,147,216,0.08); }
.state-unknown { color: var(--text-muted); border-color: var(--glass-border); background: var(--glass-bg); }

/* ─── Tooltip ────────────────────────────────────────────────────────── */
.tooltip {
  position: fixed;
  pointer-events: none;
  z-index: 50;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  background: rgba(20,20,30,0.9);
  border: 1px solid rgba(255,255,255,0.14);
  backdrop-filter: blur(16px);
  font-size: 12px; color: var(--text-primary);
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.15s;
  transform: translate(-50%, -120%);
}
.tooltip.show { opacity: 1; }

/* ─── Search bar ─────────────────────────────────────────────────────── */
.search-wrap {
  position: relative; z-index: 10;
  padding: 0 40px 20px;
  max-width: 380px;
}
.search-input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  border-radius: 24px;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus {
  border-color: rgba(79,195,247,0.5);
  box-shadow: 0 0 0 3px rgba(79,195,247,0.1);
}
.search-icon {
  position: absolute;
  left: 54px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 14px;
  pointer-events: none;
}

/* ─── Responsive ─────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .header { padding: 24px 20px 16px; }
  .legend, .search-wrap, .table-scroll { padding-left: 12px; padding-right: 12px; }
  .search-icon { left: 26px; }
}

@media (max-width: 640px) {
  .modal-3d { min-height: 200px; }
  .detail-symbol { font-size: 52px; }
  .detail-name { font-size: 20px; }
  .detail-grid { grid-template-columns: 1fr; }
  .modal-detail { padding: 24px 20px; }
}
</style>
</head>
<body>

<div class="ambient"></div>

<!-- Header -->
<header class="header">
  <div class="header-title">
    <h1>Periodic Table</h1>
    <p>118 Elements · Liquid Glass Interface</p>
  </div>
  <span class="element-count">v2025 · IUPAC</span>
</header>

<!-- Search -->
<div class="search-wrap">
  <span class="search-icon">⌕</span>
  <input class="search-input" type="text" placeholder="Search element or symbol…" id="searchInput" />
</div>

<!-- Legend -->
<div class="legend" id="legend"></div>

<!-- Periodic Grid -->
<div class="table-scroll">
  <div class="periodic-grid" id="periodicGrid"></div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card" id="modalCard">
    <div class="modal-3d" id="modal3d">
      <canvas id="three-canvas"></canvas>
      <div class="modal-3d-label">Atomic Model</div>
      <div class="drag-hint">↻ Drag to rotate</div>
    </div>
    <div class="modal-detail" id="modalDetail"></div>
    <button class="modal-close" id="modalClose">✕</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════

/* ═══════════════════════════════════════════════════════════════════════
   GRID LAYOUT
   Maps each element to [col, row] in the 18-column grid
═══════════════════════════════════════════════════════════════════════ */
function getGridPos(el) {
  // Special f-block rows (lanthanides period:9, actinides period:10)
  if (el.period === 9) {
    // Ce–Lu → cols 4–17, row 9
    const idx = el.z - 58; // 0-based
    return { col: idx + 4, row: 9 };
  }
  if (el.period === 10) {
    const idx = el.z - 90;
    return { col: idx + 4, row: 10 };
  }
  // Standard layout
  const col = el.group;
  let row = el.period;
  // Push f-block gap periods down
  if (el.period >= 6 && (el.z === 57 || el.z === 89)) {
    // La and Ac stay in group 3 row 6/7 but also have f-block series below
  }
  return { col, row };
}

/* ═══════════════════════════════════════════════════════════════════════
   BUILD LEGEND
═══════════════════════════════════════════════════════════════════════ */
let activeFilter = null;
const legendEl = document.getElementById('legend');
Object.entries(CAT_META).forEach(([cat, meta]) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.cat = cat;
  item.innerHTML = `<span class="legend-dot" style="background:${meta.color}"></span>${meta.label}`;
  item.addEventListener('click', () => toggleFilter(cat, item));
  legendEl.appendChild(item);
});

function toggleFilter(cat, itemEl) {
  const allTiles = document.querySelectorAll('.element');
  const allLegend = document.querySelectorAll('.legend-item');
  if (activeFilter === cat) {
    // Clear filter
    activeFilter = null;
    allTiles.forEach(t => t.classList.remove('dimmed','highlighted'));
    allLegend.forEach(l => l.classList.remove('active'));
  } else {
    activeFilter = cat;
    allLegend.forEach(l => l.classList.remove('active'));
    itemEl.classList.add('active');
    allTiles.forEach(t => {
      if (t.dataset.cat === cat) {
        t.classList.remove('dimmed'); t.classList.add('highlighted');
      } else {
        t.classList.add('dimmed'); t.classList.remove('highlighted');
      }
    });
  }
}

    "metalloid":  "var(--c-metalloid)",
    "nonmetal":   "var(--c-nonmetal)",
    "halogen":    "var(--c-halogen)",
    "noble-gas":  "var(--c-noble)",
    "unknown":    "var(--c-unknown)",
  };
  tile.style.setProperty('--cat-color', colorMap[el.cat] || 'rgba(255,255,255,0.2)');

  // Staggered animation
  tile.style.animationDelay = `${0.008 * idx}s`;

  tile.innerHTML = `
    <span class="el-number">${el.z}</span>
    <span class="el-symbol">${el.sym}</span>
    <span class="el-name">${el.name}</span>
    <span class="el-mass">${el.mass}</span>
  `;

  // Grid positioning
  const pos = getGridPos(el);
  tile.style.gridColumn = pos.col;
  tile.style.gridRow = pos.row;

  // Tooltip
  tile.addEventListener('mouseenter', e => showTooltip(e, el));
  tile.addEventListener('mouseleave', hideTooltip);
  tile.addEventListener('mousemove', moveTooltip);

  // Click → open modal
  tile.addEventListener('click', () => openModal(el));

  grid.appendChild(tile);
});

// Label tiles for lanthanide/actinide rows
function makeRowLabel(text, col, row) {
  const label = document.createElement('div');
  label.style.gridColumn = `${col}`;
  label.style.gridRow = `${row}`;
  label.style.display = 'flex';
  label.style.alignItems = 'center';
  label.style.justifyContent = 'flex-end';
  label.style.paddingRight = '6px';
  label.style.fontSize = '9px';
  label.style.color = 'var(--text-muted)';
  label.style.letterSpacing = '0.4px';
  label.style.textTransform = 'uppercase';
  label.style.fontWeight = '500';
  label.textContent = text;
  grid.appendChild(label);
}
makeRowLabel('Ln', 3, 9);
makeRowLabel('An', 3, 10);

/* ═══════════════════════════════════════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════════════════════════════════════ */
const tooltip = document.getElementById('tooltip');
let tooltipVisible = false;

function showTooltip(e, el) {
  tooltip.textContent = `${el.name} — ${CAT_META[el.cat]?.label || el.cat}`;
  tooltip.classList.add('show');
  tooltipVisible = true;
}
function hideTooltip() {
  tooltip.classList.remove('show');
  tooltipVisible = false;
}
function moveTooltip(e) {
  if (!tooltipVisible) return;
  tooltip.style.left = `${e.clientX}px`;
  tooltip.style.top  = `${e.clientY}px`;
}

/* ═══════════════════════════════════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════════════════════════════════ */
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  const tiles = document.querySelectorAll('.element');
  if (!q) {
    tiles.forEach(t => t.classList.remove('dimmed','highlighted'));
    return;
  }
  tiles.forEach(t => {
    const z = parseInt(t.dataset.z);
    const el = ELEMENTS[z - 1];
    const match = el.name.toLowerCase().includes(q) || el.sym.toLowerCase().includes(q) || String(el.z) === q;
    if (match) {
      t.classList.remove('dimmed'); t.classList.add('highlighted');
    } else {
      t.classList.add('dimmed'); t.classList.remove('highlighted');
    }
  });
});

/* ═══════════════════════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════════════════════ */
const overlay = document.getElementById('modalOverlay');
const detailPanel = document.getElementById('modalDetail');
const closeBtn = document.getElementById('modalClose');
let threeRenderer, threeScene, threeCamera, threeAnimId;
let isDragging = false, prevMouse = {x:0,y:0}, atomGroup;

function openModal(el) {
  // Build detail panel
  const colorMap = {
    "alkali":"var(--c-alkali)","alkaline":"var(--c-alkaline)",
    "lanthanide":"var(--c-lanthanide)","actinide":"var(--c-actinide)",
    "transition":"var(--c-transition)","post-trans":"var(--c-post-trans)",
    "metalloid":"var(--c-metalloid)","nonmetal":"var(--c-nonmetal)",
    "halogen":"var(--c-halogen)","noble-gas":"var(--c-noble)","unknown":"var(--c-unknown)"
  };
  const catColor = colorMap[el.cat] || 'rgba(255,255,255,0.5)';
  const stateClass = { solid:'state-solid', liquid:'state-liquid', gas:'state-gas', unknown:'state-unknown' }[el.state] || 'state-unknown';
  const stateIcon = { solid:'⬛', liquid:'💧', gas:'💨', unknown:'?' }[el.state] || '?';
  const discovery = el.year ? `${el.year}` : 'Ancient / Unknown';

  detailPanel.innerHTML = `
    <div class="detail-category" style="color:${catColor}">${CAT_META[el.cat]?.label || el.cat}</div>
    <div class="detail-symbol-row">
      <span class="detail-symbol">${el.sym}</span>
      <span class="detail-number">#${el.z}</span>
    </div>
    <div class="detail-name">${el.name}</div>
    <div class="detail-divider"></div>
    <div class="detail-grid">
      <div class="detail-field">
        <span class="detail-label">Atomic Mass</span>
        <span class="detail-value">${el.mass} u</span>
      </div>
      <div class="detail-field">
        <span class="detail-label">Year Discovered</span>
        <span class="detail-value">${discovery}</span>
      </div>
      <div class="detail-field full">
        <span class="detail-label">Electron Configuration</span>
        <span class="detail-value mono">${el.config}</span>
      </div>
      <div class="detail-field">
        <span class="detail-label">State (Room Temp)</span>
        <span class="detail-value"><span class="state-badge ${stateClass}">${stateIcon} ${el.state.charAt(0).toUpperCase()+el.state.slice(1)}</span></span>
      </div>
      <div class="detail-field">
        <span class="detail-label">Group / Period</span>
        <span class="detail-value">${el.group ? 'Group '+el.group : 'f-block'} · Period ${el.period <= 8 ? el.period : el.period === 9 ? 6 : 7}</span>
      </div>
    </div>
  `;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Init Three.js after modal is visible
  requestAnimationFrame(() => buildAtomScene(el));
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  destroyThree();
}

closeBtn.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ═══════════════════════════════════════════════════════════════════════
   THREE.JS ATOMIC VISUALISATION
═══════════════════════════════════════════════════════════════════════ */
function destroyThree() {
  if (threeAnimId) cancelAnimationFrame(threeAnimId);
  if (threeRenderer) {
    threeRenderer.dispose();
    threeRenderer = null;
  }
  threeScene = null; threeCamera = null; atomGroup = null;
}

function buildAtomScene(el) {
  destroyThree();
  const canvas = document.getElementById('three-canvas');
  const container = document.getElementById('modal3d');
  const W = container.clientWidth || 360;
  const H = container.clientHeight || 280;

  threeRenderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  threeRenderer.setSize(W, H);
  threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  threeRenderer.setClearColor(0x000000, 0);

  threeScene = new THREE.Scene();
  threeCamera = new THREE.PerspectiveCamera(50, W / H, 0.1, 100);
  threeCamera.position.set(0, 0, 6);

  // Ambient + point lights
  threeScene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const pLight = new THREE.PointLight(0x7fc8ff, 2, 20);
  pLight.position.set(4, 4, 4);
  threeScene.add(pLight);
  const pLight2 = new THREE.PointLight(0xff9fcc, 1.5, 20);
  pLight2.position.set(-4, -3, 2);
  threeScene.add(pLight2);

  atomGroup = new THREE.Group();
  threeScene.add(atomGroup);

  // Nucleus — clusters of protons+neutrons
  const nucleusGroup = new THREE.Group();
  const numNucleons = Math.min(el.z, 20); // limit for perf
  const nucleonGeo = new THREE.SphereGeometry(0.12, 8, 8);
  for (let i = 0; i < numNucleons; i++) {
    const isProton = i < el.z;
    const mat = new THREE.MeshPhongMaterial({
      color: isProton ? 0xff6b9d : 0x4fc3f7,
      shininess: 120, specular: 0xffffff,
    });
    const nucl = new THREE.Mesh(nucleonGeo, mat);
    const theta = (i / numNucleons) * Math.PI * 2;
    const phi = Math.acos(2 * (i / numNucleons) - 1);
    const r = 0.25 + (i % 3) * 0.1;
    nucl.position.set(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.sin(phi) * Math.sin(theta),
      r * Math.cos(phi)
    );
    nucleusGroup.add(nucl);
  }
  atomGroup.add(nucleusGroup);

  // Electron shells — based on period/electron count
  const shells = getShellConfig(el.z);
  const shellColors = [0x4fc3f7, 0x7c83f5, 0xff6b9d, 0xffe066, 0x7ee8a2, 0xffaa5c, 0xce93d8];
  
  shells.forEach((electrons, shellIdx) => {
    const radius = 0.9 + shellIdx * 0.75;
    // Orbit ring
    const ringGeo = new THREE.TorusGeometry(radius, 0.012, 6, 80);
    const ringMat = new THREE.MeshBasicMaterial({
      color: shellColors[shellIdx % shellColors.length],
      opacity: 0.3, transparent: true,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    // Tilt each orbit differently
    ring.rotation.x = (shellIdx * 0.7 + 0.4);
    ring.rotation.y = (shellIdx * 0.5);
    atomGroup.add(ring);

    // Electron spheres
    const eMat = new THREE.MeshPhongMaterial({
      color: shellColors[shellIdx % shellColors.length],
      emissive: shellColors[shellIdx % shellColors.length],
      emissiveIntensity: 0.4,
      shininess: 200,
    });
    const eGeo = new THREE.SphereGeometry(0.07, 10, 10);

    for (let e = 0; e < electrons; e++) {
      const electronPivot = new THREE.Object3D();
      electronPivot.rotation.x = ring.rotation.x;
      electronPivot.rotation.y = ring.rotation.y;
      const electronMesh = new THREE.Mesh(eGeo, eMat);
      const angle = (e / electrons) * Math.PI * 2;
      electronMesh.position.set(
        radius * Math.cos(angle),
        radius * Math.sin(angle),
        0
      );
      electronPivot.add(electronMesh);
      electronPivot.userData.speed = 0.4 + shellIdx * 0.2 + e * 0.01;
      electronPivot.userData.isElectron = true;
      electronPivot.userData.radius = radius;
      electronPivot.userData.angle = angle;
      electronPivot.userData.shellIdx = shellIdx;
      atomGroup.add(electronPivot);
    }
  });

  // Drag to rotate
  canvas.addEventListener('mousedown', onDragStart);
  canvas.addEventListener('mousemove', onDragMove);
  canvas.addEventListener('mouseup', onDragEnd);
  canvas.addEventListener('touchstart', onTouchStart, { passive: true });
  canvas.addEventListener('touchmove', onTouchMove, { passive: true });
  canvas.addEventListener('touchend', onDragEnd);

  // Animation loop
  let t = 0;
  function animate() {
    threeAnimId = requestAnimationFrame(animate);
    t += 0.012;
    nucleusGroup.rotation.y = t * 0.3;
    nucleusGroup.rotation.x = t * 0.2;

    atomGroup.children.forEach(child => {
      if (child.userData.isElectron) {
        const si = child.userData.shellIdx;
        const speed = child.userData.speed;
        const newAngle = child.userData.angle + t * speed;
        const r = child.userData.radius;
        const mesh = child.children[0];
        mesh.position.set(r * Math.cos(newAngle), r * Math.sin(newAngle), 0);
      }
    });

    threeRenderer.render(threeScene, threeCamera);
  }
  animate();
}

// Returns electrons per shell
function getShellConfig(z) {
  const maxByShell = [2, 8, 18, 32, 32, 18, 8];
  const shells = [];
  let remaining = z;
  for (let cap of maxByShell) {
    if (remaining <= 0) break;
    const n = Math.min(remaining, cap);
    shells.push(n);
    remaining -= n;
  }
  return shells;
}

// Drag rotation
function onDragStart(e) { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; }
function onDragMove(e) {
  if (!isDragging || !atomGroup) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  atomGroup.rotation.y += dx * 0.012;
  atomGroup.rotation.x += dy * 0.012;
  prevMouse = { x: e.clientX, y: e.clientY };
}
function onDragEnd() { isDragging = false; }
function onTouchStart(e) {
  if (e.touches.length === 1) onDragStart({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
}
function onTouchMove(e) {
  if (e.touches.length === 1) onDragMove({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
}
</script>
