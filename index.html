<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f8f9fd">
<title>Periodic Table of Elements</title>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<div class="app-container">
    <div class="header">
        <div class="header-text">
            <h1 id="title-text">Periodic Table of Elements</h1>
        </div>
        <div class="controls-right">
            <button class="lang-toggle" id="lang-toggle" aria-label="Toggle language">
                <span class="lang-label" id="lang-label">EN</span>
            </button>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                <span class="icon-moon">&#9790;</span>
                <span class="icon-sun">&#9728;</span>
            </button>
        </div>
    </div>

    <!-- LEGEND -->
    <div class="legend" id="legend"></div>

    <!-- PERIODIC TABLE -->
    <div class="table-wrapper">
        <div class="periodic-table" id="periodic-table"></div>
    </div>
</div>

<!-- DETAIL PANEL OVERLAY -->
<div class="overlay" id="overlay">
    <div class="detail-panel">
        <div class="detail-header">
            <div class="element-badge">
                <div class="badge-symbol" id="badge-symbol"></div>
                <div class="badge-info">
                    <h2 id="badge-name"></h2>
                    <div class="subtitle" id="badge-subtitle"></div>
                </div>
            </div>
            <button class="close-btn" id="close-btn">&times;</button>
        </div>
        <div class="detail-body">
            <div class="atom-viewer" id="atom-viewer">
                <div class="mode-toggle" id="mode-toggle">
                    <button class="mode-btn active" id="mode-bohr">Bohr</button>
                    <button class="mode-btn" id="mode-orbital">Orbital</button>
                </div>
                <div class="atom-label" id="atom-label">Drag to rotate</div>
            </div>
            <div class="detail-info" id="detail-info"></div>
        </div>
    </div>
</div>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- APPLICATION -->
<script src="script.js"></script>
</body>
</html>
