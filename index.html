<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f8f9fd">
<title>Periodic Table of Elements</title>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<div class="app-container">
    <div class="header">
        <div class="header-text">
            <h1 id="title-text">Periodic Table of Elements</h1>
        </div>
        <div class="legend" id="legend"></div>
        <div class="controls-right">
            <button class="lang-toggle" id="lang-toggle" aria-label="Toggle language">
                <span class="lang-label" id="lang-label">EN</span>
            </button>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                <span class="icon-moon">&#9790;</span>
                <span class="icon-sun">&#9728;</span>
            </button>
        </div>
    </div>

    <!-- PERIODIC TABLE -->
    <div class="table-wrapper">
        <div class="periodic-table" id="periodic-table"></div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <a href="https://github.com/Enco-shark/element_web" target="_blank" rel="noopener noreferrer" class="github-link" aria-label="View source on GitHub">
            <svg class="github-icon" viewBox="0 0 16 16" width="18" height="18" fill="currentColor">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            <span>Open Source</span>
        </a>
    </div>
</div>

<!-- DETAIL PANEL OVERLAY -->
<div class="overlay" id="overlay">
    <div class="detail-panel">
        <div class="detail-header">
            <div class="element-badge">
                <div class="badge-symbol" id="badge-symbol"></div>
                <div class="badge-info">
                    <h2 id="badge-name"></h2>
                    <div class="subtitle" id="badge-subtitle"></div>
                </div>
            </div>
            <button class="close-btn" id="close-btn">&times;</button>
        </div>
        <div class="detail-body">
            <div class="atom-viewer" id="atom-viewer">
                <div class="mode-toggle" id="mode-toggle">
                    <button class="mode-btn active" id="mode-bohr">Bohr</button>
                    <button class="mode-btn" id="mode-orbital">Orbital</button>
                </div>
                <div class="atom-label" id="atom-label">Drag to rotate</div>
            </div>
            <div class="detail-info" id="detail-info"></div>
        </div>
    </div>
</div>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- APPLICATION -->
<script src="script.js"></script>
</body>
</html>
