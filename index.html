<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<main class="app-container" role="main">
    <header class="header">
        <div class="header-text">
            <h1 id="title-text">Periodic Table of Elements</h1>
        </div>
        <div class="legend" id="legend"></div>
        <div class="controls-right">
            <a href="https://enco-shark.github.io/chem-web/" target="_blank" rel="noopener noreferrer" class="lab-link" aria-label="Chemistry Lab" title="Chemistry Lab">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M9 3h6v6l4 8H5l4-8V3z"/>
                    <path d="M9 3h6"/>
                    <path d="M10 17h4"/>
                </svg>
            </a>
            <a href="https://github.com/Enco-shark/element_web" target="_blank" rel="noopener noreferrer" class="github-link" aria-label="GitHub" title="GitHub">
                <svg class="github-icon" viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
            </a>
            <button class="lang-toggle" id="lang-toggle" aria-label="Toggle language">
                <span class="lang-label" id="lang-label">EN</span>
            </button>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                <span class="icon-moon">&#9790;</span>
                <span class="icon-sun">&#9728;</span>
            </button>
        </div>
    </header>

    <!-- PERIODIC TABLE -->
    <section class="table-wrapper" aria-label="Periodic Table of Elements">
        <div class="periodic-table" id="periodic-table" role="grid" aria-label="Chemical elements grid"></div>
    </section>

</main>

<!-- DETAIL PANEL OVERLAY -->
<dialog class="overlay" id="overlay" aria-modal="true" aria-labelledby="badge-name">
    <article class="detail-panel">
        <div class="detail-header">
            <div class="element-badge">
                <div class="badge-symbol" id="badge-symbol" aria-hidden="true"></div>
                <div class="badge-info">
                    <h2 id="badge-name"></h2>
                    <div class="subtitle" id="badge-subtitle"></div>
                </div>
            </div>
            <button class="close-btn" id="close-btn" aria-label="Close element details">&times;</button>
        </div>
        <div class="detail-body">
            <figure class="atom-viewer" id="atom-viewer">
                <div class="mode-toggle" id="mode-toggle" role="tablist" aria-label="Visualization mode">
                    <button class="mode-btn active" id="mode-bohr" role="tab" aria-selected="true">Bohr</button>
                    <button class="mode-btn" id="mode-orbital" role="tab" aria-selected="false">Orbital</button>
                </div>
                <figcaption class="atom-label" id="atom-label">Drag to rotate</figcaption>
            </figure>
            <section class="detail-info" id="detail-info" aria-label="Element properties"></section>
        </div>
    </article>
</dialog>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- APPLICATION -->
<script src="script.js"></script>
</body>
</html>
